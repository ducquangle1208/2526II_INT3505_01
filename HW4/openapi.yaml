components:
  schemas:
    Book:
      properties:
        author:
          title: Author
          type: string
        id:
          title: Id
          type: integer
        title:
          title: Title
          type: string
      required:
      - id
      - title
      - author
      title: Book
      type: object
    BookInput:
      example:
        author: Robert C. Martin
        title: Clean Architecture
      properties:
        author:
          description: Tên tác giả
          title: Author
          type: string
        title:
          description: Tên cuốn sách
          title: Title
          type: string
      required:
      - title
      - author
      title: BookInput
      type: object
    BookList:
      items:
        $ref: '#/components/schemas/Book'
      title: BookList
      type: array
    MessageResponse:
      properties:
        message:
          title: Message
          type: string
      required:
      - message
      title: MessageResponse
      type: object
    ValidationErrorModel:
      properties:
        ctx:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          description: An optional object which contains values required to render
            the error message.
          title: Error context
        input:
          description: The input provided for validation.
          title: Input
        loc:
          description: The error's location as a list.
          items: {}
          title: Location
          type: array
        msg:
          description: A human readable explanation of the error.
          title: Message
          type: string
        type:
          description: A computer-readable identifier of the error type.
          title: Error Type
          type: string
        url:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: The URL to further information about the error.
          title: URL
      required:
      - type
      - loc
      - msg
      - input
      title: ValidationErrorModel
      type: object
  securitySchemes: null
info:
  description: API quản lý sách sử dụng Flask-OpenAPI3 và Pydantic
  title: Books Management API
  version: 1.0.0
openapi: 3.1.0
paths:
  /books:
    get:
      operationId: get_books_books_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookList'
          description: OK
        '422':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidationErrorModel'
                type: array
          description: Unprocessable Entity
      summary: Lấy danh sách tất cả các sách
      tags:
      - Books
    post:
      operationId: create_book_books_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: Created
        '422':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidationErrorModel'
                type: array
          description: Unprocessable Entity
      summary: Thêm sách mới
      tags:
      - Books
  /books/{book_id}:
    delete:
      operationId: delete_book_books__int_book_id__delete
      parameters:
      - description: ID của cuốn sách
        in: path
        name: book_id
        required: true
        schema:
          description: ID của cuốn sách
          title: Book Id
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: OK
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidationErrorModel'
                type: array
          description: Unprocessable Entity
      summary: Xóa sách
      tags:
      - Books
    get:
      operationId: get_book_books__int_book_id__get
      parameters:
      - description: ID của cuốn sách
        in: path
        name: book_id
        required: true
        schema:
          description: ID của cuốn sách
          title: Book Id
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: OK
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidationErrorModel'
                type: array
          description: Unprocessable Entity
      summary: Lấy thông tin sách theo ID
      tags:
      - Books
    put:
      operationId: update_book_books__int_book_id__put
      parameters:
      - description: ID của cuốn sách
        in: path
        name: book_id
        required: true
        schema:
          description: ID của cuốn sách
          title: Book Id
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: OK
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidationErrorModel'
                type: array
          description: Unprocessable Entity
      summary: Cập nhật thông tin sách
      tags:
      - Books
servers:
- description: Local Server
  url: http://localhost:5000
tags:
- description: Các thao tác quản lý sách
  name: Books
